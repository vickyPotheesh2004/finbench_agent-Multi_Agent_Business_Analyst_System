name: FinBench CI Gate

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      # CI runners are shared machines — total RAM usage is outside our
      # control. PYTEST_RUNNING tells ResourceGovernor to use the test
      # threshold for any runtime check() calls during the suite.
      PYTEST_RUNNING: "1"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pydantic==2.7.1
        pip install pytest==8.2.0
        pip install pytest-cov
        pip install numpy
        pip install psutil==5.9.8
        pip install scipy
        pip install datasets
        pip install rich==13.7.1
        pip install python-dotenv==1.0.1
        pip install pyyaml

    - name: Run CI gate tests
      run: |
        pytest tests/test_ci_gate.py -v --tb=short

    - name: C5 seed check
      run: |
        python -c "
        import sys
        sys.path.insert(0, '.')
        from src.utils.seed_manager import SeedManager
        assert SeedManager.get() == 42, 'C5 VIOLATION: seed != 42'
        print('C5 check passed: seed=42')
        "

    - name: C9 rlef scan on outputs folder
      run: |
        if [ -d "outputs" ] && [ "$(ls -A outputs)" ]; then
          if grep -r "_rlef_" outputs/ 2>/dev/null; then
            echo "C9 VIOLATION: _rlef_ found in outputs"
            exit 1
          fi
        fi
        echo "C9 check passed: no _rlef_ in outputs"

    - name: C4 governor logic check
      run: |
        python -c "
        import sys
        sys.path.insert(0, '.')
        from src.utils.resource_governor import ResourceGovernor, PROD_HALT_GB
        # On a shared CI runner we cannot control total system RAM, so we do
        # NOT assert the runner is under 14GB. Instead we verify the C4
        # governor itself is wired correctly: the production hard cap is 14GB,
        # status() returns the required keys, and the safety logic is callable.
        assert PROD_HALT_GB == 14.0, f'C4 VIOLATION: prod cap must be 14GB, got {PROD_HALT_GB}'
        status = ResourceGovernor.status()
        for key in ('used_gb', 'total_gb', 'available_gb', 'percent', 'safe', 'halt_gb'):
            assert key in status, f'C4 status missing key: {key}'
        assert isinstance(status['safe'], bool), 'C4 safe flag must be bool'
        print(f'C4 check passed: prod hard cap = {PROD_HALT_GB}GB, governor wired OK')
        print(f'  (runner RAM: used={status[\"used_gb\"]}GB total={status[\"total_gb\"]}GB available={status[\"available_gb\"]}GB)')
        "
